<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | DESMATH</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body {
            margin: 0;
            background-color: #0f172a;
            color: #e5e7eb;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
        }
        .login-card {
            background: #1e293b;
            border-radius: 25px;
            padding: 40px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            text-align: center;
            max-width: 400px;
            width: 100%;
            border: 2px solid #38bdf8;
            animation: fadeIn 0.6s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .form-control {
            background-color: #0f172a;
            border: 1px solid #334155;
            color: white;
            border-radius: 12px;
        }
        .form-control:focus {
            background-color: #0f172a;
            border-color: #38bdf8;
            color: white;
            box-shadow: 0 0 0 0.25rem rgba(56, 189, 248, 0.25);
        }
        .btn-login {
            background-color: #0ea5e9;
            border: none;
            padding: 12px;
            font-weight: bold;
            border-radius: 12px;
            transition: 0.3s;
        }
        .btn-login:hover {
            background-color: #38bdf8;
            transform: scale(1.02);
        }
    </style>
</head>
<body>

    <div class="login-card">
        <i class="fa-solid fa-calculator fa-4x text-info mb-3"></i>
        <h2 class="fw-bold mb-4 text-info">DESMATH</h2>
        <p class="text-secondary small mb-4">Silakan masuk untuk memulai belajar Perbandingan Senilai</p>
        
        <div class="mb-4 text-start">
            <label class="small mb-1 ms-1 text-secondary">Siapa Nama Kamu?</label>
            <input type="text" id="userInput" class="form-control form-control-lg text-center" placeholder="Ketik nama di sini..." required>
        </div>
        
        <button class="btn btn-info btn-lg w-100 text-white btn-login" onclick="prosesLogin()">
            MULAI BELAJAR <i class="fa-solid fa-arrow-right-to-bracket ms-2"></i>
        </button>
    </div>

    <script>
        function prosesLogin() {
            const nama = document.getElementById('userInput').value;

            if (nama.trim() === "") {
                alert("Harap masukkan nama kamu terlebih dahulu!");
                return;
            }

            // Menyimpan nama ke memori browser (Session)
            sessionStorage.setItem('namaSiswa', nama);

            // Pindah ke halaman index.html
            window.location.href = "dashboard.html";
        }

        // Memungkinkan login dengan menekan tombol 'Enter'
        document.getElementById('userInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                prosesLogin();
            }
        });
    </script>
</body>
</html>
